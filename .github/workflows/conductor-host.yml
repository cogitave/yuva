# Yuva M38 — the conductor host-adjudication lane (TRINITY ADOPT-1). STAGE A's
# OFFLINE host-adjudicated path, RETAINED as stage B lands the kernel-integrated
# loop (proposal §11A/§11B: the conductor-host stays for the offline lane; stage B
# ADDS the guest-serial path -- it is not removed).
#
# WHAT THIS IS (M38 proposal §2.2/§8/§11A): a CPU-only, zero-network-at-runtime,
# zero-secret, autonomously-buildable lane that proves the machine ORCHESTRATES
# its own organs under a Kani-verified discrete policy and MEASURES the result.
# The conductor-host binary runs the verified tb-encode::conductor policy over a
# FIXED OFFLINE transcript of three M38-authored deterministic mock organs
# ({RetrievalOverMemory, LocalM32-mock, ExternalMock} — NO real M31/M32 calls, NO
# network), CAPTURES the organ-call trace as a SEPARATE stream, and INDEPENDENTLY
# recomputes the M22-folded decision lineage from THAT trace. The LOAD-BEARING
# stub-killer is the cross-process equality policy-head == host-independent-recompute
# head (§8.6) — a fabricated trace yields a different head and the lane goes RED.
#
# THE MARKER `M38: conductor OK turns=N organs=K verdict=ACCEPT` is printed in this
# workflow's adjudication summary AND (since stage B) on the guest serial as the
# NEW cumulative tail (the run scripts grep it; M31 is demoted-not-deleted). At
# stage B the §8.6 cross-process recompute moved guest->host: the kernel emits the
# trace, the host conductor-host (--recompute-from-trace) independently re-folds it,
# and the run-script string-equals the two heads.
#
# STAGE SCOPE (binding, §8/§11): stage A is HOST-ADJUDICATED
# (guestpath=MOCK-PINNED-HOST-ADJUDICATED) — this lane's witness; the kernel-
# integrated organ-execution loop is STAGE B (#105 closes there), wired into the
# boot in scripts/run-{x86_64,aarch64}.sh. This lane keeps adjudicating the
# offline conductor-host witness + the two anti-hollow negatives.
#
# ANTI-HOLLOW (§8): the lane ALSO runs the two negative modes (--forge-single-organ
# and --forge-lineage) and asserts they go RED — a stub that always picks one organ
# or forges the lineage MUST be caught (the measured >=2-organ sequence + the real
# Verifier verdict + the cross-process lineage equality are all load-bearing).

name: conductor-host

on:
  push:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # The cumulative-tail INVARIANT (source-level), STAGE B. The full M0..M38 chain
  # boot is ci.yml's job (it runs on the SAME push); re-booting it here would
  # duplicate ci.yml for zero added evidence. At STAGE B the conductor is wired
  # into the kernel boot and M38 IS the cumulative tail (it DISPLACED M31, which is
  # demoted-not-deleted per the run-script displacement discipline). So the source-
  # level obligation INVERTS from stage A: the run scripts now grep for the M38
  # marker as the top-level DoD, and M31 is still asserted directly (the
  # demote-not-delete invariant).
  # ---------------------------------------------------------------------------
  cumulative-tail-invariant:
    name: cumulative tail is M38 + M31 demoted-not-deleted (source)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: The cumulative tail is now M38 (stage B) on BOTH arches
        run: |
          set -euo pipefail
          for f in scripts/run-x86_64.sh scripts/run-aarch64.sh; do
            if ! grep -qE -- "MARKER=.M38: conductor OK" "$f"; then
              echo "::error::the M38 cumulative-tail marker is not the top-level grep in $f (stage B wires the conductor into the boot — M38 must be the tail)"
              exit 1
            fi
          done
          echo ">> cumulative tail 'M38: conductor OK ...' is the top-level grep on both arches"
      - name: M31 is demoted-not-deleted (still asserted directly)
        run: |
          set -euo pipefail
          for f in scripts/run-x86_64.sh scripts/run-aarch64.sh; do
            if ! grep -qF -- 'M31: infer-e2e OK backend=MOCK-DETERMINISTIC' "$f"; then
              echo "::error::M31 was DELETED from $f — the displacement discipline is demote-NOT-delete (M31 must still be asserted directly under the M38 tail)"
              exit 1
            fi
          done
          echo ">> M31 demoted-not-deleted: still asserted directly beneath the M38 tail on both arches"

  # ---------------------------------------------------------------------------
  # The conductor measurement + adjudication — the heart of the lane.
  # ---------------------------------------------------------------------------
  conductor:
    name: M38 stage A — the host conductor (host-adjudicated)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-06

      # §8.7 — the env-ABSENCE assertion (the zero-secret lane's leak negative):
      # ANTHROPIC_API_KEY must not be defined on this lane at all.
      - name: Env-absence assertion (zero-secret lane)
        run: |
          set -euo pipefail
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY is defined on the zero-secret conductor lane (it must be absent — §8.7)"
            exit 1
          fi
          echo ">> env-absence OK: no ANTHROPIC_API_KEY on this lane"

      # The lockfile-cleanliness rule (proposal §2.2): conductor-host path-deps
      # tb-encode ALONE — zero network deps, zero unlanded-crate dep.
      - name: Dep-clean assertion (zero network deps in the conductor-host lockfile)
        run: |
          set -euo pipefail
          if grep -iE 'ureq|reqwest|hyper|tokio|rustls|serde_json' tools/conductor-host/Cargo.lock; then
            echo "::error::a network/serde dependency is in tools/conductor-host/Cargo.lock — stage A must be zero-network, tb-encode-only"
            exit 1
          fi
          echo ">> dep-clean OK: conductor-host links tb-encode alone (no network deps)"

      - name: Build the conductor-host (release)
        env:
          CARGO_INCREMENTAL: "0"
        run: cargo build --release --manifest-path tools/conductor-host/Cargo.toml

      # (1) THE HONEST RUN — the verified policy + the independent recompute MATCH.
      - name: Run the conductor (honest) and capture the witness
        run: |
          set -o pipefail
          tools/conductor-host/target/release/conductor-host 2>conductor.err | tee witness.log
          echo "rc=${PIPESTATUS[0]}"
          tail -4 conductor.err || true

      - name: Adjudicate the witness (the §8 guards — independent host-recompute)
        run: |
          set -euo pipefail
          bash scripts/conductor-adjudicate.sh witness.log

      # (2) THE ANTI-HOLLOW NEGATIVES — both MUST go RED (exit 1). A stub that
      #     always picks one organ / forges the lineage cannot pass.
      - name: Negative — --forge-single-organ MUST be caught (lane RED)
        run: |
          set -uo pipefail
          set +e
          tools/conductor-host/target/release/conductor-host --forge-single-organ > forge-single.log 2>&1
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::the --forge-single-organ degenerate stub PASSED (organs<2 / revise<1 must fail the witness — anti-hollow hole)"
            cat forge-single.log || true
            exit 1
          fi
          # And the adjudicator must ALSO reject its witness.
          set +e
          bash scripts/conductor-adjudicate.sh forge-single.log >/dev/null 2>&1
          adj=$?
          set -e
          if [ "$adj" -eq 0 ]; then
            echo "::error::the adjudicator ACCEPTED a single-organ stub witness (the measured-sequence guard is hollow)"
            exit 1
          fi
          echo ">> --forge-single-organ correctly REJECTED (binary rc=${rc}, adjudicator rc=${adj})"

      - name: Negative — --forge-lineage MUST be caught (lane RED)
        run: |
          set -uo pipefail
          set +e
          tools/conductor-host/target/release/conductor-host --forge-lineage > forge-lineage.log 2>&1
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::the --forge-lineage tamper PASSED (the independent host-recompute must diverge from the policy head — the loopback/fixture killer is hollow)"
            cat forge-lineage.log || true
            exit 1
          fi
          set +e
          bash scripts/conductor-adjudicate.sh forge-lineage.log >/dev/null 2>&1
          adj=$?
          set -e
          if [ "$adj" -eq 0 ]; then
            echo "::error::the adjudicator ACCEPTED a forged-lineage witness (the cross-process recompute leg is hollow)"
            exit 1
          fi
          # Positively confirm the heads DIVERGED in the forged witness.
          if ! grep -qE 'lineage-equal=0x0( |$)' forge-lineage.log; then
            echo "::error::the forged-lineage witness did not declare lineage-equal=0x0 (the divergence was not surfaced)"
            exit 1
          fi
          echo ">> --forge-lineage correctly REJECTED (binary rc=${rc}, adjudicator rc=${adj}, lineage-equal=0x0)"

      - name: Print the workflow-only marker + summary
        run: |
          set -euo pipefail
          MARKER="$(grep -E '^M38: conductor OK ' witness.log | head -1)"
          echo "${MARKER}"
          {
            echo '## M38 conductor (stage A): OK'
            echo 'TRINITY ADOPT-1 — a Kani-verified discrete policy orchestrated three organs over a fixed offline transcript; the host INDEPENDENTLY recomputed the M22 decision lineage from a SEPARATE trace capture (the cross-process anti-hollow leg). The novelty is the verified+attested+sovereign WRAPPER, NOT a new learning paradigm.'
            echo '```'
            cat witness.log
            echo '```'
            echo 'The cumulative tail stays `M31: infer-e2e OK backend=MOCK-DETERMINISTIC` (the M38 marker lives ONLY here, never in the guest-serial chain). Stage A is host-adjudicated (`guestpath=MOCK-PINNED-HOST-ADJUDICATED`); the kernel-integrated loop is stage B (#105 closes there). The two anti-hollow negatives (`--forge-single-organ`, `--forge-lineage`) were both REJECTED.'
          } >> "$GITHUB_STEP_SUMMARY"
