  #
  # #101 -- WHY TWO SHARD JOBS (the m29-stage-c-kani-budget-plan.md option 4
  # escape hatch, trigger FIRED): the pre-agreed trigger was "shard when a
  # measured full pass exceeds ~38 min"; the first post-M29-stage-C CI pass
  # measured 41m22s of the 45-min cap (local WSL 29.2 min -- the runner delta
  # is real), and M31 stage A adds +6 harnesses. The split is balanced by
  # MEASURED per-harness cost (the PR #27/#30/#32 tables -- the khash-heavy
  # fold family spread across both shards -- then REBALANCED on the #101
  # per-shard timed runs: 46 + 44 names, ~15 min local each), not by count:
  # each shard projects ~21-24 min on CI against the 30-min per-job timeout.
  # Codegen is DUPLICATED per shard (sharding splits SOLVING
  # time only; the #77 cache reclaims codegen on unchanged-crate pushes).
  # COMPLETENESS IS GUARDED, fail-closed, in BOTH jobs: verify-encode.sh runs
  # shards_assert_complete (scripts/kani-shards.sh) BEFORE any proof --
  # len(A)+len(B) == EXPECTED_HARNESSES_TOTAL == grep -c '#[kani::proof]'
  # proofs.rs, lists disjoint, every name resolves -- so a renamed/added/
  # dropped harness can NEVER silently vanish from coverage (the M29
  # execution-enforced count-gate lesson). The proof gate itself stays counted
  # from Kani's own SUCCESSFUL lines per shard, never a static grep.
  prove-encode-a:
    name: "prove #49 encoders shard A (Kani)"
    runs-on: ubuntu-latest
    # Fail fast + clearly if a harness ever regresses into a state explosion.
    # The fold family is COMPRESSION-BUDGETED per docs/plans/m29-stage-c-plan.md
    # (the three per-milestone fold harnesses are leaf-sensitivity + the tokened
    # composition; kani_exp_fold_tamper is the one kept-FULL end-to-end witness,
    # in this shard). Shard A (the complete khash family + the two cheap M33
    # attest layout harnesses) MEASURE each new/changed harness locally in WSL
    # (`cargo kani -p tb-encode --harness <name>`) BEFORE pushing.
    # M33: the per-job timeout is bumped 30 -> 40 (the #106 hot-run data showed
    # only ~1.5-2.5 min headroom under the old 30-min cap; the agreed headroom
    # fix that accompanies the M33 shard-C addition -- a 3-way split PLUS more
    # headroom -- a finer split is a named later follow-up).
    timeout-minutes: 65
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # #77: same honest cache scope as prove-caps -- COMPILATION artifacts only,
      # every CBMC verification re-executes per run (a cache hit can never fake a
      # proof). Both shard jobs use the SAME key (codegen is shard-independent,
      # so they restore the same artifacts); unchanged-crate pushes
      # (docs/scripts/kernel-only PRs) reclaim the duplicated codegen;
      # tb-encode-touching pushes still pay their own codegen + solving.
      - name: Cache Kani toolchain + build artifacts (encode)
        uses: actions/cache@v4
        with:
          path: |
            ~/.kani
            ~/.cargo/registry
            target/kani
          key: kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ hashFiles('crates/tb-encode/**') }}
          restore-keys: |
            kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-

      # Installs Kani's own pinned toolchain (the action has no install-only mode,
      # so it proves ONE cheap smoke harness). M29 lesson: until M29 this step ran
      # the FULL suite and verify-encode.sh then re-ran it -- the suite was being
      # verified TWICE per lane and timed it out. The COUNTED, fail-closed gate is
      # and remains verify-encode.sh's counted shard pass below; this smoke only
      # proves the toolchain works end-to-end on one harness first (the same
      # smoke harness in both shard jobs is fine -- it is NOT part of the
      # counted gate).
      - name: Install Kani toolchain (one-harness smoke)
        uses: model-checking/kani-github-action@v1
        with:
          args: '-p tb-encode --harness kani_adjust_within_allowed --output-format=terse'

      # THE gate: the counted shard-A pass -- FAILS CLOSED unless the #101
      # completeness guard holds (lists disjoint + exhaustive vs proofs.rs),
      # every shard-A harness verifies, AND the SUCCESSFUL count matches shard
      # A's pinned list length, then emits `V1-shard-a: kani-encoders OK`.
      # CBMC peak-memory headroom: the heavy encoder proofs (esp. the shard-C
      # multi-sector FNV persisted-head proofs) sit near the 7 GiB runner ceiling
      # and marginally OOM -> the runner is reclaimed ("received a shutdown
      # signal", exit 143). Disk-backed swap lets the solve complete within the
      # (bumped) 50-min budget. Additive, hermetic, no proof change.
      - name: Add swap headroom for CBMC
        run: |
          # ubuntu-latest already has an active /swapfile (can't resize -> "Text
          # file busy"); add a fresh, larger swapfile on the big /mnt ephemeral
          # disk instead (~74 GiB free) so we never touch the busy one.
          sudo fallocate -l 14G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "swap enabled:"; free -h

      - name: Assert encoder proof marker (shard A, fail-closed harness count)
        run: bash scripts/verify-encode.sh
        env:
          SHARD: a

  # The B half of the #101 shard pair -- see the rationale block above
  # prove-encode-a. Identical steps; only SHARD differs. The two lists live in
  # scripts/kani-shards.sh and are guarded disjoint + exhaustive in BOTH jobs.
  prove-encode-b:
    name: "prove #49 encoders shard B (Kani)"
    runs-on: ubuntu-latest
    # Shard B (the learning-loop codec families + M31/M38); same margin
    # rationale as shard A. Timeout bumped 30 -> 40 with the M33 shard-C
    # addition (the #106 headroom fix).
    timeout-minutes: 65
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # #77 cache -- same key as prove-encode-a (both restore the same
      # compilation artifacts; proof results are never cached).
      - name: Cache Kani toolchain + build artifacts (encode)
        uses: actions/cache@v4
        with:
          path: |
            ~/.kani
            ~/.cargo/registry
            target/kani
          key: kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ hashFiles('crates/tb-encode/**') }}
          restore-keys: |
            kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-

      # One-harness smoke -- same role as in shard A (toolchain install only,
      # never part of the counted gate).
      - name: Install Kani toolchain (one-harness smoke)
        uses: model-checking/kani-github-action@v1
        with:
          args: '-p tb-encode --harness kani_adjust_within_allowed --output-format=terse'

      # THE gate: the counted shard-B pass -- FAILS CLOSED unless the #101
      # completeness guard holds, every shard-B harness verifies, AND the
      # SUCCESSFUL count matches shard B's pinned list length, then emits
      # `V1-shard-b: kani-encoders OK`.
      # CBMC peak-memory headroom (see shard-A rationale).
      - name: Add swap headroom for CBMC
        run: |
          # ubuntu-latest already has an active /swapfile (can't resize -> "Text
          # file busy"); add a fresh, larger swapfile on the big /mnt ephemeral
          # disk instead (~74 GiB free) so we never touch the busy one.
          sudo fallocate -l 14G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "swap enabled:"; free -h

      - name: Assert encoder proof marker (shard B, fail-closed harness count)
        run: bash scripts/verify-encode.sh
        env:
          SHARD: b

  # The C shard -- the M33 provenance-lineage CRYPTO-VERIFY harnesses (the
  # SHA-256 leaf + the LMS verify leaf's `w=1` toy instance). PRE-REGISTERED as
  # a third shard by the M33 proposal §9: a full-parameter LMS verify is ~1062
  # SHA-256 compressions (INFEASIBLE in CBMC), so the toy is proven at a
  # khash-regime budget (~6-8 concrete compressions per verify, SHA-256 measured
  # ~11s/compression local WSL). Only the compression-bearing crypto leaves land
  # here (the cheap attest layout harnesses live in shard A) so the split is by
  # MEASURED cost. Identical steps to A/B; only SHARD differs. The three lists
  # live in scripts/kani-shards.sh, guarded disjoint + exhaustive in ALL jobs.
  prove-encode-c:
    name: "prove #49 encoders shard C (Kani) -- M33 crypto-verify"
    runs-on: ubuntu-latest
    # Six crypto-verify harnesses; SHA-256 ~11s/compression, LMS toy ~6-8
    # compressions/verify -- projected well under the 40-min cap (the same
    # headroom-fix timeout as A/B).
    timeout-minutes: 65
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # #77 cache -- same key as prove-encode-a/b (shared compilation artifacts;
      # proof results are never cached).
      - name: Cache Kani toolchain + build artifacts (encode)
        uses: actions/cache@v4
        with:
          path: |
            ~/.kani
            ~/.cargo/registry
            target/kani
          key: kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ hashFiles('crates/tb-encode/**') }}
          restore-keys: |
            kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-

      # One-harness smoke -- same role as in shard A/B (toolchain install only,
      # never part of the counted gate).
      - name: Install Kani toolchain (one-harness smoke)
        uses: model-checking/kani-github-action@v1
        with:
          args: '-p tb-encode --harness kani_adjust_within_allowed --output-format=terse'

      # THE gate: the counted shard-C pass -- FAILS CLOSED unless the #101
      # completeness guard holds, every shard-C harness verifies, AND the
      # SUCCESSFUL count matches shard C's pinned list length, then emits
      # `V1-shard-c: kani-encoders OK`.
      # CBMC peak-memory headroom -- shard C is the heaviest (the multi-sector
      # FNV persisted-head proofs); this is the shard that was OOM-reclaimed.
      - name: Add swap headroom for CBMC
        run: |
          # ubuntu-latest already has an active /swapfile (can't resize -> "Text
          # file busy"); add a fresh, larger swapfile on the big /mnt ephemeral
          # disk instead (~74 GiB free) so we never touch the busy one.
          sudo fallocate -l 14G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "swap enabled:"; free -h

      - name: Assert encoder proof marker (shard C, fail-closed harness count)
        run: bash scripts/verify-encode.sh
        env:
          SHARD: c

  # The D shard -- the #76 four-way rebalance. ~Half of the old shard B: the
  # learning-loop CODEC families (M23 exp, M24 explore/bakeoff, M27 tpsched, the
  # M30 inferwire req-binding + the M31 inferwire adapter six, M39 corpus, M40
  # recall) moved OFF B so that neither B (now 36) nor D (35) runs past the
  # 65-min job cap on a COLD tb-encode-touching push (the 3-way split put shard B
  # at 71 harnesses, which was cancelled). Identical steps to A/B/C; only SHARD
  # differs. The four lists live in scripts/kani-shards.sh, guarded disjoint +
  # exhaustive in ALL jobs.
  prove-encode-d:
    name: "prove #49 encoders shard D (Kani)"
    runs-on: ubuntu-latest
    # ~35 learning-loop codec harnesses; measured heavy-sum ~398s -- projected
    # ~40-44 min COLD (~15 min duplicated codegen + solving), ~25-28 min WARM,
    # under the 65-min cap with headroom (same rationale as A/B/C).
    timeout-minutes: 65
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # #77 cache -- same key as prove-encode-a/b/c (shared compilation artifacts;
      # proof results are never cached).
      - name: Cache Kani toolchain + build artifacts (encode)
        uses: actions/cache@v4
        with:
          path: |
            ~/.kani
            ~/.cargo/registry
            target/kani
          key: kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ hashFiles('crates/tb-encode/**') }}
          restore-keys: |
            kani-encode-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-

      # One-harness smoke -- same role as in shard A/B/C (toolchain install only,
      # never part of the counted gate).
      - name: Install Kani toolchain (one-harness smoke)
        uses: model-checking/kani-github-action@v1
        with:
          args: '-p tb-encode --harness kani_adjust_within_allowed --output-format=terse'

      # THE gate: the counted shard-D pass -- FAILS CLOSED unless the #101
      # completeness guard holds, every shard-D harness verifies, AND the
      # SUCCESSFUL count matches shard D's pinned list length, then emits
      # `V1-shard-d: kani-encoders OK`.
      # CBMC peak-memory headroom (see shard-A rationale).
      - name: Add swap headroom for CBMC
        run: |
          # ubuntu-latest already has an active /swapfile (can't resize -> "Text
          # file busy"); add a fresh, larger swapfile on the big /mnt ephemeral
          # disk instead (~74 GiB free) so we never touch the busy one.
          sudo fallocate -l 14G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "swap enabled:"; free -h

      - name: Assert encoder proof marker (shard D, fail-closed harness count)
        run: bash scripts/verify-encode.sh
        env:
          SHARD: d
