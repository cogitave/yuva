# Yuva M11 capability proof gate (Kani).
#
# Machine-proves the rights-subset / no-confused-deputy invariant over the
# host-verifiable `tb-caps-core` crate -- the SAME Rights algebra + CapTable<O>
# slot/generation logic the kernel runs (zero model drift). The proofs are pure
# SAFE, single-threaded, asm-free Rust, squarely inside Kani's supported subset.
#
# This runs on ubuntu-latest only (Kani CI supports x86_64-unknown-linux-gnu).
# The official model-checking/kani-github-action installs Kani's OWN pinned
# toolchain (independent of rust-toolchain.toml), so -Zbuild-std never
# contaminates the host verification, then scripts/verify-caps.sh asserts ZERO
# failures AND that the SUCCESSFUL count equals the pinned EXPECTED_HARNESSES
# before emitting the DoD marker `M11: caps-subset PROVEN` (fail-closed).
#
# NOT a required check / no branch-protection changes here -- the lane is
# advisory until the orchestrator promotes it.

name: kani

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prove-caps:
    name: prove M11 rights-subset (Kani)
    runs-on: ubuntu-latest
    # Fail fast + clearly if a harness ever regresses into a state explosion,
    # instead of hanging until an ambiguous external cancel. The full 12-harness
    # suite verifies in well under this once the Tier-3 harnesses are bounded.
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # #77: cache the Kani toolchain install + cargo registry + the Kani BUILD
      # artifacts (target/kani). HONEST SCOPE: this caches COMPILATION outputs
      # only -- `cargo kani` always re-executes every CBMC verification on every
      # run (proof RESULTS are never cached, so a cache hit can never fake a
      # proof); cargo's fingerprinting rebuilds anything whose source changed.
      # Effect: docs-only/unchanged-crate pushes skip the toolchain install +
      # codegen; pushes that touch the crate still pay their own codegen.
      - name: Cache Kani toolchain + build artifacts (caps)
        uses: actions/cache@v4
        with:
          path: |
            ~/.kani
            ~/.cargo/registry
            target/kani
          key: kani-caps-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ hashFiles('crates/tb-caps-core/**') }}
          restore-keys: |
            kani-caps-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-

      # Installs Kani's own pinned toolchain + runs `cargo kani` over the crate.
      - name: Run Kani over tb-caps-core
        uses: model-checking/kani-github-action@v1
        with:
          args: '-p tb-caps-core --output-format=terse'

      # Re-runs the proofs and FAILS CLOSED unless every harness verifies AND the
      # SUCCESSFUL count matches the pinned constant, then emits the DoD marker.
      - name: Assert proof marker (fail-closed harness count)
        run: bash scripts/verify-caps.sh

  # Task #49 encoder proof gate. Machine-proves the PURE silicon-adjacent
  # encoders/validators -- the VMX control-MSR adjust legality gate (the #1 cause
  # of silent VM-entry failure), the CR0/CR4 fixed-bit clamp, the TSS-base decode,
  # the page-table/EPT entry encoders, the 16-byte IPC frame codec + bounded ring,
  # and (L2.1) the aarch64 stage-2 descriptor + VTCR/VTTBR packers + the
  # ESR_EL2/HPFAR_EL2 trap decoders -- over the host-verifiable `tb-encode` crate
  # (the SAME pure code tb-hal CALLS to feed its VMX/EPT/MMU/stage-2 asm,
  # byte-identically). Since #101 this is a PAIR of INDEPENDENT shard jobs
  # (prove-encode-a / prove-encode-b -- see the shard block below the harness
  # inventory) that neither share state with nor can break the M11 `prove-caps`
  # lane above. Each runs `cargo kani -p tb-encode --exact --harness <name>...`
  # over its pinned shard list (NEVER --workspace -- that would drag tb-hal's
  # inline asm into CBMC), then scripts/verify-encode.sh asserts ZERO failures
  # AND that SUCCESSFUL == that shard's pinned count, with the two lists pinned
  # disjoint + exhaustive against the total
  # EXPECTED_HARNESSES_TOTAL (currently 123: the 122 prior + the M32-B
  # infer_tag peer-pair negative kani_inferwire_infer_peer_bound; before that 112
  # prior + the 10 M33
  # provenance-lineage harnesses -- 2 SHA-256 leaf (kani_sha256_total /
  # kani_sha256_kat), 4 LMS verify toy-instance (kani_lms_verify_total /
  # kani_lms_verify_tamper / kani_lms_otschain_step / kani_lms_merklepath),
  # 2 DSSE-PAE attestation codec (kani_attest_pae_injective /
  # kani_attest_decode_fail_closed), and the 2 STAGE-B multi-sector persisted-
  # head codec harnesses (kani_persisted_record_decode / kani_persisted_record_
  # recover); the 6 crypto-verify + 2 stage-B codec harnesses form shard C, the
  # 2 cheap attest layout harnesses joined shard A. Prior tally:
  # the 15 original + the 5 L2.1 stage-2/
  # el2_trap harnesses + the 1 L2.2 el2-exits classifier harness + the 2 L2.3
  # SYS64/DABT ISS trap-and-emulate decoders + the 1 aL2.4 sctlr_el1_guest_enable
  # guest-S1-enable harness + the 1 aL2.5 gich_lr_encode_roundtrip GICH_LRn
  # list-register encoder harness + the 3 aL2.6 SMMUv3 ste_s2_roundtrip /
  # ste_vtcr_matches_cpu_stage2 / smmu_cmd_encode_total encoder harnesses + the 6
  # M20 blkfmt durable-persistence codecs: blk_req_header_roundtrip /
  # blk_superblock_identity / blk_superblock_decode_total / blk_frame_header_roundtrip
  # / blk_record_frame_decode_total / blk_sector_math_and_gen_monotone + the 6 M21
  # kancell verified additive-policy-leaf harnesses: kani_kan_spline_eval_total_bounded
  # / kani_kan_score_no_overflow_bounded / kani_kan_monotone_structural /
  # kani_kan_table_validators_total / kani_kan_score_deterministic /
  # kani_kan_envelope_no_widening + the 6 M22 prov verified provenance-ledger
  # harnesses: kani_prov_canon_injective (the load-bearing canon totality+injectivity
  # proof) / kani_prov_hash_total / kani_prov_chain_mix_tamper / kani_prov_inclusion_sound
  # / kani_prov_canon_roundtrip / kani_prov_head_deterministic + the 6 M23 exp verified
  # experience-codec harnesses: kani_exp_canon_injective (the load-bearing fixed-width
  # canon totality+injectivity proof, incl the reserved propensity + present-Unset
  # outcome tag) / kani_exp_replay_determinism (a recorded feats row replays through the
  # dormant kan_score to kan_score_shadow BIT-IDENTICALLY, feats bounded to the kancell
  # clamp range) / kani_exp_ring_total / kani_exp_fold_tamper (reusing the M22 fold) /
  # kani_exp_canon_roundtrip / kani_exp_schema_stability (Unset+sentinel has identical
  # length+offsets to a populated record -- M24 cannot shift the fold) + the 6 M24
  # explore/bakeoff verified HONEST-GATE harnesses: kani_explore_propensity_total_positivity
  # (shielded epsilon-greedy propensity TOTAL + m==1 singleton==1000 + positivity in [1,1000])
  # / kani_bakeoff_label_partition (the 3-way right-censored survival label is total +
  # exhaustive + mutually-exclusive + monotone-resolution) / kani_bakeoff_bound_sound_rounddown
  # (Manski+smoothness value_lower_bound + empirical-Bernstein eb_lower_bound total + sound +
  # rounds down) / kani_bakeoff_replay_determinism (the explore action keyed to the immutable
  # decision_id + propensity + label + bound all replay bit-for-bit) / kani_kan_envelope_no_widening_m24
  # (the M21 envelope-no-widening proof re-asserts under the soft-greedy path -- the coin chooses
  # only AMONG cleared candidates) / kani_bakeoff_schema_stability (a resolved survival label +
  # soft-greedy propensity shift no byte offset) + the 6 M25 opframe verified OPERATOR-
  # TRANSCRIPT harnesses: kani_opframe_canon_injective (the load-bearing canon
  # totality+injectivity proof, the payload_len prefix disambiguating the variable tail)
  # / kani_opframe_partition_leak (THE LEAKAGE GUARD negative control -- canon fail-closes
  # on the sealed SAFETY_HELD_OUT partition, the Seldonian no-snoop invariant) /
  # kani_opframe_seq_monotone (seq_index_exact catches gap/dup/reorder/non-zero-start)
  # / kani_opframe_intro_binding (the genesis INTRO binds the transcript to the live M22
  # head; a forged anchor is rejected) / kani_opframe_fold_truncation (M29-C-thinned to
  # LEAF-sensitivity + flip-back -- chain-level rejection by the documented composition
  # fold-claim=LEAF-SENSITIVITY+COMPOSED(chain_mix_tamper, inclusion_sound;
  # e2e=exp_fold_tamper) -- + the closing GATE_VERDICT catches tail-truncation
  # VERBATIM) / kani_opframe_canon_roundtrip (decode(canon(frame))==frame) + the 5
  # M26 exittel verified EL2 EXIT-TELEMETRY harnesses: kani_exittel_canon_injective (the
  # load-bearing fixed-width canon totality+injectivity proof) / kani_exittel_canon_roundtrip
  # (decode(canon(rec))==rec) / kani_exittel_class_total (the reused L2.2 classify_exit is
  # total over every ESR; class_tag/class_from_tag is a bijection on the 6 classes -> an
  # exit's class always encodes to a valid round-trippable byte) / kani_exittel_histogram_saturates
  # (bucket_index in 0..N_BUCKETS for ALL u64 + ExitHistogram::record saturating, count
  # monotone) / kani_exittel_fold_tamper (M29-C-thinned to LEAF-sensitivity + flip-back;
  # fold-claim=LEAF-SENSITIVITY+COMPOSED(chain_mix_tamper, inclusion_sound;
  # e2e=exp_fold_tamper)) + the 5 M27 tpsched verified TWO-VMID TIME-PARTITION-SCHEDULER harnesses:
  # kani_tpsched_next_slot_roundrobin (next_slot total + strict 0->1->0 round-robin + neither
  # slot a fixed point -> no VMID starves) / kani_tpsched_frame_conserved (frame_total == sum of
  # slot_deadline_delta over a symbolic plan; every slot clamped up to MIN_SLOT_TICKS -> no
  # starvation, <= frame -> no monopoly, saturating no-overflow) / kani_tpsched_canon_injective /
  # kani_tpsched_canon_roundtrip / kani_tpsched_fold_tamper (M29-C-thinned to LEAF-sensitivity
  # + flip-back; fold-claim=LEAF-SENSITIVITY+COMPOSED(chain_mix_tamper, inclusion_sound;
  # e2e=exp_fold_tamper)) + the 6 M28 opframe_rx verified OPERATOR-INBOUND command
  # harnesses (the RX dual of M25 opframe -- the CAPSTONE): kani_cmd_canon_injective (the load-
  # bearing canon totality+injectivity proof -- the MAC'd bytes = everything EXCEPT the trailing
  # mac; the payload_len u32 prefix disambiguates the variable tail; decode fails closed without
  # the trailing MAC) / kani_cmd_stale_nonce (decode recovers the echoed nonce EXACTLY + the REAL
  # gate `verify_decoded` -- the pure buffer-free/hash-free conjunctive core decode_and_verify
  # delegates its verdict to VERBATIM -- returns the precise RejectStale iff the echo mismatches a
  # fully SYMBOLIC challenge, Accept proves freshness, + the kind conjunct dominates (NotActivate);
  # only the decode_and_verify WRAPPER's multi-buffer plumbing stays out of CBMC (array-theory
  # blow-up) -- that plumbing is exercised concretely by the host tests, all 7 verdict arms under
  # the Miri lane, + boot) / kani_cmd_head_binding (decode recovers the bound op_head EXACTLY + the
  # gate returns the precise RejectWrongHead iff the bound head differs from a FULLY SYMBOLIC live
  # head, Accept proves the heads matched -- the Terrapin lesson) / kani_cmd_dual_custody (decode
  # recovers BOTH cred ids EXACTLY + the ACCEPT-IFF-ALL theorem: with kind/fresh/head pinned true
  # the gate's verdict is EXACTLY determined -- RejectSingleCred iff cred_a==cred_b, RejectBadMac
  # iff distinct-creds AND !mac_ok, Accept iff distinct-creds AND mac_ok -- the two-person rule +
