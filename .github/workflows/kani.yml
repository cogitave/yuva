  # CONCRETE canon-bytes input changes the recomputed MAC -- since M29 the body under proof is the
  # khash-backed DERIVE-THEN-MAC, 2 keyed-BLAKE2s calls; SYMBOLIC flip index, every compression
  # concrete, re-measured at the swap) / kani_cmd_key_evolve (key_evolve is deterministic +
  # advances + tamper-sensitive -- since M29 the domain-separated keyed-PRF call, the Bellare-Yee
  # shape, re-measured at the swap); the MAC tier is mac=KEYED-CRYPTO (M29, assumption-conditional:
  # implementation VERIFIED, primitive security ASSUMED-FROM-LITERATURE; the retired
  # KEYED-NONCRYPTO tier is guard-REJECTED;
  # oracle=SIMULATED-ENROLLED-KEY; an accepted command is necessary-not-sufficient, kan_active=0;
