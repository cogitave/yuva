# Yuva continuous integration.
#
# What this proves on every push / PR: the from-scratch kernel still BUILDS and
# BOOTS on both supported architectures, and the cumulative milestone self-test
# (M0 boot -> M1 traps -> M2 context switch -> M3 MMU -> M4 user/ring) still
# prints its final marker over the guest serial port. The per-arch run scripts
# (scripts/run-<arch>.sh) launch the kernel under QEMU in pure-TCG mode (no KVM
# required), scrape the serial output for the milestone marker, and exit
# non-zero (fail-closed) if it never appears or the guest times out.
#
# Since M30 both lanes ALSO spawn the xport-harness host peer against a
# QEMU virtconsole chardev unix socket (the spike-verified
# `-device virtio-serial-device -device virtconsole` config): the kernel's
# verified inference-transport channel must complete a HOST-KEYED echo whose
# challenge/tag the run script string-compares CROSS-PROCESS between the guest
# serial witness and the harness's own stdout -- the two-leg anti-hollow
# composition (a loopback cannot equal khash(K,..) without the host-custodied
# per-run key). The chardev lanes are accel-independent: the REQUIRED M30
# evidence (codec + framing + host-keyed echo, both arches) never depends on
# KVM (M30 proposal §8).
#
# Toolchain note: the kernel is a `no_std` image cross-compiled with
# `-Zbuild-std` against checked-in custom target specs (targets/*.json), so we
# need a Rust *nightly* with the `rust-src` and `llvm-tools` components. QEMU is
# installed headless (`--no-install-recommends` keeps the GUI/audio stack out).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Build identity — MIRRORS scripts/project.env (the single source of truth at
# the script level). Workflows cannot cheaply source an env file in `${{ }}`
# expressions, so the same values are defined ONCE per workflow in this env:
# block; a rename changes scripts/project.env and these env: blocks together.
env:
  KERNEL_BIN: yuva-kernel
  TARGET_X86: x86_64-yuva-none
  TARGET_A64: aarch64-yuva-none

jobs:
  build-and-boot:
    name: build & boot (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # `target_var` names the top-level env: var holding the target stem
          # (GitHub does not expose the env context inside strategy.matrix, so
          # the matrix carries the var NAME and the build step dereferences it
          # at the shell level — the stem itself stays in the ONE env block).
          - arch: x86_64
            target_var: TARGET_X86
            qemu_pkg: qemu-system-x86
            run: scripts/run-x86_64.sh
            qemu_timeout: 40
          - arch: aarch64
            target_var: TARGET_A64
            qemu_pkg: qemu-system-arm
            run: scripts/run-aarch64.sh
            # aarch64 lane is pure TCG + single-threaded (-accel tcg,thread=single
            # in run-aarch64.sh); the cold start to rust_main on a contended
            # runner needs more headroom than x86. 90s makes the wall-clock
            # ceiling un-raceable so it never SIGTERMs a slow-but-healthy boot
            # mid-chain (the aL2.4 M6 "stall" was that startup-race artifact).
            qemu_timeout: 240
            # QEMU >= 9.0 IS REQUIRED for the aL2.6 SMMUv3 stage-2 PROVEN path:
            # IDR0.S2P (the stage-2 capability the rung programs against) was only
            # added by the Mostafa series in QEMU 9.0 (2024). The hosted
            # ubuntu-latest runner's apt qemu-system-arm is 8.2.2 (S1P=1 but S2P=0),
            # which would force aL2.6 into its honest green '(no stage-2 SMMU,
            # skipped)' variant. The roadmap bar is that EVERY L2 rung RUNS (not
            # skips) under TCG in CI, so this lane boots the freshly built ELF
            # inside a debian:trixie-slim container (qemu 10.x via apt
            # qemu-system-arm) instead of on the runner. The kernel + every OTHER
            # lane is built on the runner exactly as before -- ONLY this boot step
            # moves into the container, so the blast radius is one step on one
            # arch. docker is preinstalled on ubuntu-latest. The container image
            # tag is the single knob that pins the QEMU major.
            boot_in_container: debian:trixie-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Nightly + the components -Zbuild-std needs. rust-toolchain.toml pins the
      # channel to "nightly"; this action honours it and adds the components.
      - name: Install Rust nightly (rust-src, llvm-tools)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-06
          components: rust-src, llvm-tools

      # Runner-native QEMU for the lanes that boot on the runner (x86_64). The
      # aarch64 lane gets its QEMU (>= 9.0) from the debian:trixie-slim container
      # instead -- see the container boot step below -- so it does NOT apt-install
      # qemu on the runner; this `if` keeps the slower-and-too-old 8.2.2 package
      # off the aarch64 lane entirely.
      - name: Install QEMU (headless)
        if: ${{ !matrix.boot_in_container }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.qemu_pkg }}

      - name: Cache cargo registry + build-std artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build kernel (${{ matrix.arch }})
        run: |
          TV='${{ matrix.target_var }}'
          cargo kbuild --target "targets/${!TV}.json"

      # M30: build the HOST echo peer (tools/xport-harness -- its own nested
      # workspace, host triple, plain cargo) BEFORE the boot step. Both lanes'
      # run scripts spawn it against the QEMU virtconsole chardev socket; it
      # custodies the per-run echo key/nonce (OS RNG -- never in the guest
      # image or on the QEMU command line) and prints the `xport-harness:`
      # witness the M30 guards string-compare CROSS-PROCESS against the
      # kernel's `xport:` line (the anti-hollow leg 2). Since M31 its serve
      # loop ALSO answers the MAC-chunked mock inference exchange the M31
      # guards adjudicate (ERR NO-KEY probe + ONE PENDING + 2 chunks of the
      # shared deterministic mock_infer transform -- still ZERO network, ZERO
      # secrets; the ANTHROPIC-LIVE bridge is the operator-gated stage C and
      # NEVER runs here). Built HERE (not inside
      # the run script) because the aarch64 boot runs in a cargo-less
      # debian:trixie-slim container: the bind-mounted /work carries this
      # prebuilt runner binary (glibc forward-compatible: ubuntu-24.04 2.39 ->
      # trixie 2.41).
      - name: Build xport-harness (M30 host echo peer)
        run: cargo build --release --manifest-path tools/xport-harness/Cargo.toml

      # M38 (stage B): pre-build the host conductor binary on the runner so the
      # cargo-less aarch64 boot container has it for the §8.6 CROSS-PROCESS
      # recompute leg (the run script feeds the guest's emitted conduct-step trace
      # to `conductor-host --recompute-from-trace` and string-equals the heads).
      # The x86_64 runner-native lane builds it on demand inside run-x86_64.sh; the
      # aarch64 container relies on this prebuilt copy (the xport-harness pattern).
      - name: Build conductor-host (M38 stage-B cross-process recompute peer)
        run: cargo build --release --manifest-path tools/conductor-host/Cargo.toml

      # aL2.4b: pre-generate the full-kernel EL1 guest image (the flat binary
      # the aarch64 boot's `-device loader` stages at the carve). Produced HERE
      # on the runner (which has rustup's llvm-tools llvm-objcopy) because the
      # aarch64 boot runs in a cargo-less debian:trixie-slim container -- the
      # bind-mounted /work carries this prebuilt `<ELF>.guest.bin`, and
      # run-aarch64.sh's mtime check (`KERNEL -nt GUEST_BIN`) then SKIPS the
      # in-container regen (which has no objcopy). aarch64-only; the x86 lane
      # ignores it. Mirrors the xport-harness prebuild pattern above.
      - name: Pre-generate the aL2.4b guest image (aarch64)
        if: ${{ matrix.arch == 'aarch64' }}
        run: |
          TV='${{ matrix.target_var }}'
          ELF="target/${!TV}/debug/${KERNEL_BIN}"
          OBJCOPY="$(ls "$(rustc --print sysroot)"/lib/rustlib/*/bin/llvm-objcopy | head -1)"
          "${OBJCOPY}" -O binary "${ELF}" "${ELF}.guest.bin"
          ls -l "${ELF}.guest.bin"

      # The run script boots the freshly built ELF under QEMU (TCG), greps the
      # serial log for the milestone DoD marker, and exits 0 only on a hit.
      #
      # RUNNER-NATIVE boot (x86_64): the apt-installed runner QEMU is fine -- the
      # x86 microvm/PVH path has no >= 9.0 dependency.
      - name: Boot under QEMU and assert milestone marker
        if: ${{ !matrix.boot_in_container }}
        # TCG on a contended GitHub runner can take ~15s just to reach
        # rust_main; the kernel then prints the whole M0..M19 self-test chain in
        # a fraction of a second and parks, so QEMU runs to this wall-clock
        # ceiling either way. A 15s ceiling left no headroom and produced
        # intermittent rc=124 startup-race failures (qemu killed before the
        # final marker ever printed -- not a real boot fault). The per-arch
        # ceiling (matrix.qemu_timeout: x86 40s, aarch64 240s) gives ample room
        # for a slow start plus the full chain; the aarch64 lane is additionally
        # pinned to single-threaded TCG in run-aarch64.sh so its cold-start
        # wall-time is deterministic and can never race the ceiling. The fast
        # KVM boot lanes (microvm-kvm.yml / vmm-boot.yml) are separate workflows
        # and keep their own shorter timeouts, so they pay no idle cost here.
        env:
          QEMU_TIMEOUT: ${{ matrix.qemu_timeout }}
        run: bash ${{ matrix.run }}

      # CONTAINERISED boot (aarch64): identical run script, but executed inside
      # debian:trixie-slim so the QEMU that boots the ELF is >= 9.0 (10.x), which
      # advertises SMMU IDR0.S2P=1 and therefore drives the aL2.6 SMMUv3 stage-2
      # PROVEN path ('L2.6: smmu OK' after 'smmu: stage-2 STE accepted') instead
      # of the honest '(no stage-2 SMMU, skipped)' the 8.2.2 runner QEMU would
      # take. The kernel was already BUILT on the runner by the step above; the
      # checkout (which includes target/) is bind-mounted read/write at /work and
      # run-aarch64.sh resolves its REPO_ROOT to /work, so the freshly built ELF
      # at target/$TARGET_A64/debug/$KERNEL_BIN is exactly what boots.
      # qemu-system-arm in trixie provides qemu-system-aarch64 (the binary the run
      # script invokes); -semihosting works headless in the container. `docker run`
      # exits with the container command's status, so a FAIL inside run-aarch64.sh
      # (exit 1) propagates out and reds this step -- fail-closed end to end. ONLY
      # this lane's boot moves into the container; the build + every other lane +
      # the x86 lane stay on the runner untouched.
      - name: Boot under QEMU (container, qemu >= 9.0) and assert milestone marker
        if: ${{ matrix.boot_in_container }}
        env:
          QEMU_TIMEOUT: ${{ matrix.qemu_timeout }}
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e QEMU_TIMEOUT="${QEMU_TIMEOUT}" \
            "${{ matrix.boot_in_container }}" \
            bash -c "apt-get update -qq && apt-get install -y --no-install-recommends ${{ matrix.qemu_pkg }} xxd >/dev/null && qemu-system-aarch64 --version | head -1 && bash ${{ matrix.run }}"

  # Boot Profiles stage A — the SUBSTRATE lane (an ADDITIONAL, opt-in x86_64 lane;
  # the required build-and-boot lanes above are untouched and stay the
  # byte-identical agent default). Boots the SAME x86 kernel with
  # `-append yuva.profile=substrate` and asserts: the profile-scoped micro-VMM
  # core RAN (M0..M12/M14/M15/M19/M20/M29/L2/M27/ABI), the M13..M38 chain is
  # INTACT in the exact `(substrate profile, agent organ skipped)` skip form, the
  # census-derived agent-organ witness families are ABSENT-BY-OMISSION (organs
  # proven not to have run — the anti-hollow inversion, §8.2c), the M11 chokepoint
  # denial + M18.1 promotion refusal were EXERCISED in-boot (DoD-3), and the
  # profile witness + `PROFILE: substrate OK` tail are honest. Also runs the
  # §8.2a default-boot tripwire (same binary, no cmdline ⇒ agent-complete, no
  # profile/skip leakage) as a per-run guard against profile bleed into the
  # default. x86_64-only: no EL2 there, so no stage-A substrate boot witnesses
  # guest-running (guest-evidence=AARCH64-AGENT-LANE-ONLY).
  substrate-boot:
    name: boot & assert (substrate profile, x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly (rust-src, llvm-tools)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-06
          components: rust-src, llvm-tools

      - name: Install QEMU (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86

      - name: Cache cargo registry + build-std artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-substrate-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build kernel (x86_64)
        run: cargo kbuild --target "targets/${TARGET_X86}.json"

      - name: Boot substrate profile + assert (positive core + skip chain + negative census + DoD-3 + default tripwire)
        env:
          # 40s flaked twice on 2026-07-09 on slow shared runners (TCG single-thread):
          # once mid-early-boot, once on the default-profile leg (the FULL organ chain,
          # heavier than the substrate leg) — while the same HEAD's build&boot lane
          # reached the M38 tail fine. 90s matches the compile-out PoC lane's ceiling.
          # A ceiling is a wall-clock guard, not an assertion: raising it cannot mask
          # a real regression (the marker greps stay fail-closed).
          QEMU_TIMEOUT: 90
        run: bash scripts/run-substrate-x86_64.sh

  # Boot Profiles stage-B COMPILE-OUT lane, generalized to every SELF-CONTAINED
  # organ (an ADDITIONAL, opt-in x86_64 lane; every job above is untouched and
  # stays the byte-identical agent default). Builds the kernel
  # `--no-default-features` (the kernel-crate-local `agent-organs` feature OFF, so
  # EVERY `#[cfg(feature = "agent-organs")]` block is removed), boots it under
  # `-append yuva.profile=substrate`, and asserts (table-driven) each of the 14
  # self-contained organs (M13/M16/M17/M18/M18.1/M18.2/M21/M22/M23/M24/M26/M33/
  # M39/M40) is ABSENT-BY-OMISSION from BOTH the serial stream (no marker, no skip
  # form, no witness, no `M<n>:` family residue) AND the compiled ELF (a strict
  # anchored byte-search), while the profile-scoped micro-VMM core RAN to the clean
  # `PROFILE: substrate OK` tail and the PIPELINE cluster (M25/M28/M30/M31/M38)
  # stayed built + shown in the stage-A skip form (the two grammars coexist). NOT a
  # reduced-TCB product (the witness is `organs-not-built=14 scope=SELF-CONTAINED-
  # ONLY pipeline-organs=STILL-BUILT-RUNTIME-GATED`, no minimal/secure/tcb claim).
  # Full stage B (the crate-level organ gate + the mem/ engine/organ factorization
  # + an image-size delta) is the open, named successor. A more generous 90s
  # ceiling than the substrate lane's 40s (which flaked on slow runners today).
  compileout-poc-boot:
    name: boot & assert (compile-out PoC, --no-default-features, x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly (rust-src, llvm-tools)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-06
          components: rust-src, llvm-tools

      - name: Install QEMU (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86

      - name: Cache cargo registry + build-std artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Distinct cache key: this lane builds the feature-OFF artifact into the
          # same target path, so it keeps its own cache to avoid churning the
          # default/substrate (feature-ON) caches. (cargo rebuilds on the feature
          # change regardless — the key just keeps the lanes' caches separate.)
          key: ${{ runner.os }}-cargo-compileout-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build kernel (x86_64, --no-default-features → agent-organs OFF)
        run: cargo kbuild --no-default-features --target "targets/${TARGET_X86}.json"

      - name: Boot compile-out + assert (14 self-contained organs ABSENT in stream + ELF; core ran; pipeline intact in skip form)
        env:
          QEMU_TIMEOUT: 90
        run: bash scripts/run-compileout-x86_64.sh
