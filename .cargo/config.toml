# Cargo build configuration for the none-class TABOS targets.
#
# Sources:
#    https://os.phil-opp.com/minimal-rust-kernel/  ("The build-std Option")
#    https://doc.rust-lang.org/cargo/reference/unstable.html#build-std
#    https://docs.rust-embedded.org/embedonomicon/custom-target.html
#  - runner key (cargo invokes <runner> <built-binary>):
#    https://doc.rust-lang.org/cargo/reference/config.html#targettriplerunner
#
# All commands below assume cargo is invoked from the repo root (so the relative
# linker-script and target-spec paths resolve). See BUILD.md.

# NOTE: build-std/json-target-spec are NOT set globally here, so that the std
# host crate `tb-vmm` builds normally (a global [unstable] build-std would force
# build-std onto every `cargo build`, including the host VMM, and break it).
# Instead the three kernel-only nightly flags are bundled into the `kbuild`
# alias below — the single source of truth for "how to build the kernel". CI,
# scripts, and the docs all call `cargo kbuild`, so the flags live in exactly
# one place.
[alias]
# Build the no_std kernel for a custom none-class target spec. Append the
# target (and optionally --release):
#   cargo kbuild --target targets/x86_64-tabos-none.json
#   cargo kbuild --release --target targets/aarch64-tabos-none.json
# Flags: -Zbuild-std recompiles core + compiler_builtins from rust-src (no
# precompiled std exists for none-class triples); -Zbuild-std-features enables
# compiler_builtins' mem* intrinsics (needed the moment the kernel copies/zeroes
# memory); -Zjson-target-spec lets cargo accept a `.json` target file on recent
# nightlies. Requires the nightly toolchain pinned in rust-toolchain.toml.
kbuild = "build -p tabos-kernel -Zbuild-std=core,compiler_builtins -Zbuild-std-features=compiler-builtins-mem -Zjson-target-spec"

# ---- x86_64: PVH ELF, loads at 1 MiB, links with kernel/linker/x86_64.ld ----
# `[target.<stem>]` matches `--target targets/x86_64-tabos-none.json` by the
# file-name stem (Cargo custom-JSON-target matching rule).
[target.x86_64-tabos-none]
# rust-lld (ld.lld) consumes `-T<script>`. The script keeps the
# XEN_ELFNOTE_PHYS32_ENTRY note and places .text at 0x0010_0000.
rustflags = ["-C", "link-arg=-Tkernel/linker/x86_64.ld"]
# Runner gets the built ELF path appended as $1.
runner = ["bash", "scripts/run-x86_64.sh"]

# ---- aarch64: QEMU virt first-light, links with kernel/linker/aarch64.ld ----
[target.aarch64-tabos-none]
rustflags = ["-C", "link-arg=-Tkernel/linker/aarch64.ld"]
runner = ["bash", "scripts/run-aarch64.sh"]
